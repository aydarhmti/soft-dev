<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Hub | کلینیک جامع آنلاین سلامت</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <header class="header">
      <div class="container header-inner">
        <div class="logo">
          <div class="logo-icon">H</div>
          <div class="logo-text">Harmony Hub</div>
        </div>
        <div class="nav">
          <a href="#">خانه</a>
          <a href="#">پزشکان</a>
          <a href="#">روانشناسی</a>
          <a href="#">تغذیه</a>
          <a href="#">ورزش</a>
          <a href="#">بلاگ</a>
        </div>
        <div>
          <button class="btn-outline" onclick="alert('ورود به حساب کاربری')">
            ورود
          </button>
          <button
            class="btn-primary"
            onclick="alert('ثبت‌نام در هارمونی هاب')"
            style="margin-right: 12px">
            ثبت‌نام
          </button>
        </div>
      </div>
    </header>
<div class="search-section">
      <div class="container">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input
            type="text"
            placeholder="جستجوی پزشک، متخصص، روانشناس، خدمات..."
          />
          <button>جستجو</button>
        </div>
        <div class="specialty-tags">
          <span class="tag">روانشناس آنلاین</span>
          <span class="tag">مشاوره تغذیه</span>
          <span class="tag">مربی ورزشی</span>
          <span class="tag">روانپزشک</span>
          <span class="tag">فیزیوتراپی</span>
          <span class="tag">مشاوره خانواده</span>
        </div>
      </div>
    </div>

    
</body>
</html>
